<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>Corteva — Roleta Premium</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Cinzel:wght@600;700;900&display=swap');

  /* ─── Design tokens ─────────────────────────────── */
  :root {
    --green-1:  #0a2e1a;   /* deep */
    --green-2:  #0f4d2a;   /* mid */
    --green-3:  #1a8244;   /* corteva */
    --green-4:  #2cb863;   /* highlight */
    --green-5:  #6fdc99;   /* glow */

    --gold-1:   #6e4f12;   /* dark */
    --gold-2:   #b8860b;   /* base */
    --gold-3:   #f5c43c;   /* bright */
    --gold-4:   #ffe680;   /* shine */

    --bg-1:     #04150a;
    --bg-2:     #0a2014;
    --bg-3:     #051a30;

    --ink-1:    #ffffff;
    --ink-2:    #d8e8de;
    --ink-3:    rgba(255,255,255,.55);
    --ink-4:    rgba(255,255,255,.25);

    --font-display: 'Cinzel', serif;
    --font-ui:      'Oswald', sans-serif;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg-1); }
  body {
    font-family:var(--font-ui);
    color:var(--ink-1);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* ─── Background ────────────────────────────────── */
  .stage {
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:
      radial-gradient(ellipse at 50% 35%, #0d3a22 0%, #061a0e 55%, #02080a 100%);
  }
  .stage::before {
    /* vinheta escura nas bordas */
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,.85) 100%);
    pointer-events:none;
  }
  .stage::after {
    /* textura sutil de ruído */
    content:''; position:absolute; inset:0; opacity:.04; pointer-events:none;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,.5) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(255,255,255,.5) 0 1px, transparent 1px 3px);
  }
  .orb {
    position:absolute; border-radius:50%; pointer-events:none; filter:blur(60px);
    mix-blend-mode:screen;
  }
  .orb-1 { width:50vw; height:50vw; left:-12vw; top:-15vh;
    background:radial-gradient(circle, rgba(44,184,99,.35), transparent 70%); }
  .orb-2 { width:42vw; height:42vw; right:-10vw; bottom:-15vh;
    background:radial-gradient(circle, rgba(245,196,60,.18), transparent 70%); }

  .particles { position:absolute; inset:0; pointer-events:none; }
  /* Pausa as partículas durante o giro pra liberar GPU pro canvas */
  body.spinning .particle {
    animation-play-state:paused;
  }
  body.spinning .orb {
    animation-play-state:paused;
  }
  .particle {
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#ffe680; opacity:0;
    animation:float linear infinite;
    will-change:transform, opacity;
  }
  @keyframes float {
    0%   { opacity:0; transform:translateY(0) scale(.5); }
    10%  { opacity:.7; }
    90%  { opacity:.7; }
    100% { opacity:0; transform:translateY(-120vh) scale(1); }
  }

  /* ─── Header ────────────────────────────────────── */
  .header {
    position:fixed; top:28px; left:36px; transform:none;
    z-index:30; text-align:left; pointer-events:none;
    opacity:1;
    transition:opacity .6s ease, transform .6s ease;
  }
  .header.hidden {
    opacity:0;
    transform:translateX(-30px);
  }

  /* Linha 1: "Abra Caminho para a" — menor, peso médio */
  .title-top {
    display:block;
    font-family:var(--font-ui); font-weight:500;
    font-size:clamp(12px, 1.2vw, 20px);
    letter-spacing:7px; text-transform:uppercase;
    color:rgba(255,255,255,.65);
    line-height:1;
    margin-bottom:2px;
  }

  /* Linha 2: "REVOLUÇÃO" — grande, bold, destaque total */
  .title-main {
    display:block;
    font-family:var(--font-display); font-weight:900;
    font-size:clamp(28px, 3.4vw, 58px);
    letter-spacing:6px; text-transform:uppercase;
    color:var(--green-4);
    line-height:1;
    text-shadow:
      0 0 20px rgba(111,220,153,.7),
      0 0 50px rgba(44,184,99,.4),
      0 2px 0 rgba(0,0,0,.5);
  }

  /* Linha decorativa dourada */
  .title-rule {
    display:flex; align-items:center; gap:10px;
    margin-top:10px;
  }
  .title-rule::before {
    content:'';
    display:block; width:3px; height:3px;
    background:var(--gold-3); border-radius:50%;
    box-shadow:0 0 6px var(--gold-3);
  }
  .title-rule-line {
    height:1px; width:clamp(80px, 10vw, 160px);
    background:linear-gradient(90deg, var(--gold-3), transparent);
  }

  /* Subtítulo */
  .subtitle {
    margin-top:8px;
    font-family:var(--font-ui); font-weight:400;
    font-size:clamp(8px, .75vw, 12px); letter-spacing:5px;
    color:rgba(255,255,255,.3); text-transform:uppercase;
  }

  /* ─── Stage layout ──────────────────────────────── */
  .center {
    position:relative; z-index:5;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
  }

  /* ─── Wheel ─────────────────────────────────────── */
  .wheel-wrap {
    position:relative;
    display:flex; align-items:center; justify-content:center;
    will-change:transform;
    transform-origin:center center;
  }

  .wheel-bezel {
    /* aro externo dourado com luzes */
    position:absolute; inset:-32px; border-radius:50%;
    background:
      radial-gradient(circle at 50% 50%, transparent 78%, rgba(0,0,0,.5) 79%, rgba(0,0,0,.5) 100%),
      conic-gradient(from 0deg,
        var(--gold-1) 0deg, var(--gold-3) 30deg, var(--gold-2) 60deg,
        var(--gold-4) 90deg, var(--gold-2) 120deg, var(--gold-3) 150deg,
        var(--gold-1) 180deg, var(--gold-3) 210deg, var(--gold-2) 240deg,
        var(--gold-4) 270deg, var(--gold-2) 300deg, var(--gold-3) 330deg,
        var(--gold-1) 360deg);
    box-shadow:
      inset 0 0 30px rgba(0,0,0,.6),
      0 0 60px rgba(245,196,60,.35),
      0 0 120px rgba(44,184,99,.25);
  }
  .wheel-bezel::before {
    /* anel interno escuro */
    content:''; position:absolute; inset:18px; border-radius:50%;
    background:radial-gradient(circle, var(--bg-1) 0%, var(--green-1) 100%);
    box-shadow:inset 0 0 24px rgba(0,0,0,.9);
  }

  .bulbs { position:absolute; inset:-32px; pointer-events:none; }
  .bulb {
    position:absolute; width:10px; height:10px; border-radius:50%;
    background:var(--gold-4);
    box-shadow:
      0 0 8px var(--gold-3),
      0 0 16px rgba(245,196,60,.6);
    transform:translate(-50%, -50%);
  }
  .bulb.off {
    background:var(--gold-1); box-shadow:none; opacity:.5;
  }
  @keyframes bulbBlink {
    0%,100% { background:var(--gold-4); box-shadow:0 0 8px var(--gold-3), 0 0 16px rgba(245,196,60,.7); }
    50%     { background:var(--gold-1); box-shadow:none; opacity:.3; }
  }

  canvas#wheel {
    position:relative; z-index:2;
    border-radius:50%;
    will-change:transform;
    transform:translateZ(0); /* força compositing layer dedicada na GPU */
    filter:
      drop-shadow(0 0 24px rgba(44,184,99,.5))
      drop-shadow(0 0 60px rgba(0,80,30,.5));
  }
  canvas#wheel.spinning {
    filter:
      drop-shadow(0 0 40px rgba(111,220,153,.8))
      drop-shadow(0 0 100px rgba(44,184,99,.5));
  }

  /* Pointer — triângulo de cassino apontando pra baixo */
  .pointer {
    position:absolute; top:-32px; left:50%;
    transform:translateX(-50%);
    z-index:20; will-change:transform;
    transform-origin:50% 100%; /* gira a partir da ponta inferior */
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.7));
  }
  .pointer svg { width:56px; height:64px; display:block; }

  /* Flash on stop */
  .wheel-wrap.flash::after {
    content:''; position:absolute; inset:-40px; border-radius:50%;
    background:radial-gradient(circle, rgba(255,230,128,.55), rgba(245,196,60,.2) 50%, transparent 75%);
    animation:flashRing 1s ease-out forwards;
    pointer-events:none; z-index:6;
  }
  @keyframes flashRing {
    0%   { opacity:0; transform:scale(.8); }
    25%  { opacity:1; transform:scale(1.05); }
    100% { opacity:0; transform:scale(1.3); }
  }

  /* ─── Spin counter ──────────────────────────────── */
  .counter {
    position:fixed; left:32px; bottom:32px; z-index:40;
    display:flex; flex-direction:column; align-items:flex-start; gap:14px;
    padding:20px 26px;
    background:linear-gradient(135deg, rgba(15,77,42,.55), rgba(10,32,20,.65));
    border:1px solid rgba(245,196,60,.4);
    border-radius:18px;
    backdrop-filter:blur(10px);
    box-shadow:
      0 8px 30px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.08);
    opacity:1;
    transition:opacity .6s ease, transform .6s ease;
  }
  .counter.hidden {
    opacity:0;
    transform:translateX(-30px);
  }
  .counter-label {
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(10px, .85vw, 14px); letter-spacing:5px;
    color:var(--gold-3); text-transform:uppercase;
  }
  .counter-progress {
    font-family:var(--font-display); font-weight:900;
    font-size:clamp(20px, 1.8vw, 30px); letter-spacing:3px;
    color:var(--ink-1);
  }
  .counter-progress .of { color:var(--ink-3); margin:0 4px; }
  .dots { display:flex; gap:14px; }
  .dot {
    width:24px; height:24px; border-radius:50%;
    border:2px solid rgba(245,196,60,.35);
    background:transparent;
    transition:all .35s cubic-bezier(.16,1,.3,1);
  }
  .dot.done {
    background:var(--gold-3); border-color:var(--gold-3);
    box-shadow:0 0 14px rgba(245,196,60,.8);
  }
  .dot.current {
    background:rgba(245,196,60,.4); border-color:var(--gold-3);
    box-shadow:0 0 22px rgba(245,196,60,.9);
    animation:dotPulse 1.2s ease-in-out infinite;
  }
  @keyframes dotPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.2); } }

  /* ─── Buttons ───────────────────────────────────── */
  .actions {
    position:fixed; right:32px; bottom:32px; z-index:40;
    display:flex; flex-direction:column; gap:12px;
    min-width:280px;
    opacity:1;
    transition:opacity .6s ease, transform .6s ease;
  }
  .actions.hidden {
    opacity:0;
    transform:translateX(30px);
  }
  .btn {
    position:relative; cursor:pointer; outline:none; border:none; background:none;
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(15px, 1.4vw, 22px); letter-spacing:5px;
    color:var(--ink-1); text-transform:uppercase;
    padding:18px 36px; border-radius:60px;
    overflow:hidden;
    transition:transform .2s cubic-bezier(.34,1.4,.64,1), box-shadow .2s;
    text-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  .btn::before {
    /* shine sweep ao hover */
    content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    transition:left .6s;
  }
  .btn:hover:not(:disabled)::before { left:120%; }
  .btn:disabled { opacity:.4; cursor:not-allowed; }

  .btn-spin {
    background:
      linear-gradient(180deg, var(--green-4) 0%, var(--green-3) 50%, var(--green-2) 100%);
    border:2px solid var(--gold-3);
    box-shadow:
      0 8px 30px rgba(44,184,99,.5),
      inset 0 1px 0 rgba(255,255,255,.25),
      inset 0 -2px 0 rgba(0,0,0,.3),
      0 0 0 1px rgba(245,196,60,.2);
  }
  .btn-spin:hover:not(:disabled) {
    transform:translateY(-3px);
    box-shadow:
      0 12px 40px rgba(44,184,99,.7),
      inset 0 1px 0 rgba(255,255,255,.25),
      inset 0 -2px 0 rgba(0,0,0,.3),
      0 0 0 1px var(--gold-3);
  }
  .btn-spin:active:not(:disabled) { transform:translateY(0); }

  .btn-next {
    display:none;
    background:
      linear-gradient(180deg, var(--gold-3) 0%, var(--gold-2) 50%, var(--gold-1) 100%);
    border:2px solid rgba(255,255,255,.2);
    color:var(--bg-1);
    text-shadow:0 1px 2px rgba(255,255,255,.4);
    box-shadow:
      0 8px 30px rgba(245,196,60,.4),
      inset 0 1px 0 rgba(255,255,255,.4),
      inset 0 -2px 0 rgba(0,0,0,.2);
  }
  .btn-next:hover { transform:translateY(-3px); }

  /* ─── Result bar ────────────────────────────────── */
  .result-bar {
    position:fixed; bottom:0; left:0; right:0; z-index:200;
    display:flex; align-items:center; justify-content:center; gap:36px;
    padding:32px 60px;
    background:linear-gradient(135deg, rgba(15,77,42,.95), rgba(5,26,14,.95));
    border-top:2px solid var(--gold-3);
    transform:translateY(100%);
    transition:transform .6s cubic-bezier(.34,1.4,.64,1);
    box-shadow:0 -20px 60px rgba(0,0,0,.9);
    backdrop-filter:blur(8px);
  }
  .result-bar.active { transform:translateY(0); }
  .result-bar.win {
    background:linear-gradient(135deg, rgba(26,130,68,.95), rgba(245,196,60,.4), rgba(15,77,42,.95));
    border-top:3px solid var(--gold-4);
    box-shadow:0 -20px 80px rgba(245,196,60,.5), 0 -4px 0 var(--gold-4);
    animation:winGlow 1.4s ease-in-out infinite alternate;
  }
  @keyframes winGlow {
    0%   { box-shadow:0 -20px 80px rgba(245,196,60,.4), 0 -4px 0 var(--gold-4); }
    100% { box-shadow:0 -30px 120px rgba(255,230,128,.7), 0 -4px 0 var(--gold-4); }
  }
  .result-icon {
    font-size:clamp(60px, 7vw, 90px);
    display:inline-block;
    animation:bounceInLose .6s .15s both, shakeLose 1.5s .8s ease-in-out infinite;
  }
  .result-bar.win .result-icon {
    font-size:clamp(72px, 8vw, 110px);
    animation:bounceInWin .6s .15s both, danceWin 1.2s .9s ease-in-out infinite;
  }

  /* Entrada — vitória: pula com rotação */
  @keyframes bounceInWin {
    0%   { transform:scale(0) rotate(-30deg); opacity:0; }
    50%  { transform:scale(1.4) rotate(15deg); opacity:1; }
    75%  { transform:scale(.9) rotate(-8deg); }
    100% { transform:scale(1) rotate(0); }
  }
  /* Animação contínua vitória — dancinha de festa */
  @keyframes danceWin {
    0%, 100% { transform:scale(1) rotate(0deg) translateY(0); }
    25%      { transform:scale(1.1) rotate(-12deg) translateY(-6px); }
    50%      { transform:scale(1.05) rotate(0deg) translateY(0); }
    75%      { transform:scale(1.1) rotate(12deg) translateY(-6px); }
  }

  /* Entrada — derrota: aparece tristinho, cabisbaixo */
  @keyframes bounceInLose {
    0%   { transform:scale(0) translateY(-20px); opacity:0; }
    60%  { transform:scale(1.1) translateY(8px); opacity:1; }
    100% { transform:scale(1) translateY(0); }
  }
  /* Animação contínua derrota — tremor de tristeza, vai de um lado pro outro */
  @keyframes shakeLose {
    0%, 100% { transform:rotate(0deg) translateY(0); }
    10%      { transform:rotate(-8deg) translateY(2px); }
    20%      { transform:rotate(8deg) translateY(2px); }
    30%      { transform:rotate(-6deg) translateY(0); }
    40%      { transform:rotate(6deg) translateY(0); }
    50%      { transform:rotate(0deg) translateY(-3px); }
    60%      { transform:rotate(0deg) translateY(0); }
  }

  .result-text { text-align:center; }
  .result-label {
    font-family:var(--font-ui); font-weight:500;
    font-size:clamp(13px, 1.2vw, 20px); letter-spacing:5px;
    text-transform:uppercase; color:var(--ink-3);
  }
  .result-bar.win .result-label { color:var(--gold-4); }
  .result-name {
    font-family:var(--font-display); font-weight:900;
    font-size:clamp(32px, 4.5vw, 72px); letter-spacing:3px; line-height:1.05;
    color:var(--ink-1); text-transform:uppercase;
    text-shadow:0 0 30px currentColor;
  }
  .result-bar.win .result-name {
    color:var(--ink-1);
    text-shadow:0 0 40px var(--gold-3), 0 0 80px rgba(255,230,128,.5);
  }

  /* Win stars */
  .win-star {
    position:fixed; z-index:201; pointer-events:none;
    font-size:28px; animation:floatStar 2s ease-out forwards;
  }
  @keyframes floatStar {
    0%   { opacity:1; transform:translateY(0) scale(1) rotate(0); }
    100% { opacity:0; transform:translateY(-220px) scale(1.6) rotate(360deg); }
  }

  #confetti-canvas { position:fixed; inset:0; pointer-events:none; z-index:190; }

  /* ─── Summary overlay ───────────────────────────── */
  #summary {
    display:none; position:fixed; inset:0; z-index:300;
    flex-direction:column; align-items:center; justify-content:center;
    gap:32px; padding:60px;
    background:radial-gradient(ellipse at center, rgba(15,77,42,.98), rgba(4,21,10,.98));
    backdrop-filter:blur(20px);
  }
  #summary::before {
    content:''; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,.7));
  }
  #summary > * { position:relative; z-index:1; }
  .summary-icon {
    font-size:clamp(60px, 8vw, 120px);
    animation:bounceIn .6s both;
    filter:drop-shadow(0 0 30px rgba(245,196,60,.7));
  }
  .summary-eyebrow {
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(11px, 1vw, 16px); letter-spacing:8px;
    color:var(--gold-3); text-transform:uppercase;
  }
  .summary-title {
    font-family:var(--font-display); font-weight:900;
    font-size:clamp(28px, 3.6vw, 56px); letter-spacing:3px; line-height:1.1;
    color:var(--ink-1); text-transform:uppercase; text-align:center;
    text-shadow:0 0 40px rgba(44,184,99,.6);
  }
  .summary-prizes {
    display:flex; gap:18px; flex-wrap:wrap; justify-content:center; max-width:1100px;
  }
  .summary-card {
    padding:24px 38px; border-radius:18px;
    background:rgba(255,255,255,.95);
    font-family:var(--font-display); font-weight:700;
    font-size:clamp(20px, 2.2vw, 36px); letter-spacing:2px;
    text-transform:uppercase; line-height:1;
    box-shadow:0 8px 30px rgba(0,0,0,.5), 0 0 0 2px rgba(245,196,60,.3);
    animation:bounceIn .5s both;
  }
  .summary-msg {
    font-family:var(--font-display); font-weight:600;
    font-size:clamp(14px, 1.4vw, 22px); letter-spacing:4px;
    color:var(--gold-3); text-transform:uppercase;
  }
</style>
</head>
<body>

<div class="stage">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="particles" id="particles"></div>
</div>

<canvas id="confetti-canvas"></canvas>

<div class="header">
  <span class="title-top">Abra Caminho para a</span>
  <span class="title-main">Revolução</span>
  <div class="title-rule"><div class="title-rule-line"></div></div>
  <div class="subtitle">Gire e descubra seu prêmio</div>
</div>

<div class="center">
  <div class="wheel-wrap" id="wheelWrap">
    <div class="wheel-bezel"></div>
    <div class="bulbs" id="bulbs"></div>
    <canvas id="wheel"></canvas>
    <div class="pointer">
      <svg viewBox="0 0 56 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="ptrGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#ffe680"/>
            <stop offset="50%" stop-color="#f5c43c"/>
            <stop offset="100%" stop-color="#b8860b"/>
          </linearGradient>
        </defs>
        <!-- Triângulo apontando pra baixo (clássico de cassino) -->
        <path d="M 28 60 L 4 8 Q 4 4 8 4 L 48 4 Q 52 4 52 8 Z"
              fill="url(#ptrGrad)"
              stroke="#fff"
              stroke-width="2.5"
              stroke-linejoin="round"/>
        <!-- Highlight metálico no topo -->
        <path d="M 10 8 L 46 8"
              stroke="rgba(255,255,255,.6)"
              stroke-width="2"
              stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</div>

<div class="counter">
  <div class="counter-label">Giros</div>
  <div class="counter-progress"><span id="cur">1</span><span class="of">/</span><span id="total">3</span></div>
  <div class="dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-spin" id="spinBtn">Girar</button>
  <button class="btn btn-next" id="nextBtn" onclick="nextParticipant()">Próximo Participante</button>
</div>

<div class="result-bar" id="resultBar">
  <span class="result-icon" id="resIcon">🎯</span>
  <div class="result-text">
    <div class="result-label" id="resLabel">Resultado</div>
    <div class="result-name"  id="resName">—</div>
  </div>
</div>

<div id="summary">
  <div class="summary-icon" id="sumIcon">🏆</div>
  <div class="summary-eyebrow">Resultado Final</div>
  <div class="summary-title" id="sumTitle">—</div>
  <div class="summary-prizes" id="sumPrizes"></div>
  <div class="summary-msg" id="sumMsg">—</div>
  <button class="btn btn-next" style="display:block;margin-top:10px" onclick="nextParticipant()">
    Próximo Participante
  </button>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   PRÊMIOS — paleta verde + dourada cassino
   ═══════════════════════════════════════════════════════════════ */
const PRIZES = [
  { label:"Chaveiro",          color:"#1a8244", glow:"#2cb863", win:true  },
  { label:"Boné",              color:"#0f4d2a", glow:"#1a8244", win:true  },
  { label:"Caneta",            color:"#b8860b", glow:"#f5c43c", win:true  },
  { label:"Tente Novamente",   color:"#0a2e1a", glow:"#1a4429", win:false },
  { label:"Chaveiro",          color:"#1a8244", glow:"#2cb863", win:true  },
  { label:"Caderneta",         color:"#0f4d2a", glow:"#1a8244", win:true  },
  { label:"Caneta",            color:"#b8860b", glow:"#f5c43c", win:true  },
  { label:"Tente Novamente",   color:"#0a2e1a", glow:"#1a4429", win:false },
  { label:"Chaveiro",          color:"#1a8244", glow:"#2cb863", win:true  },
  { label:"Bastão",            color:"#0f4d2a", glow:"#1a8244", win:true  },
  { label:"Caneta",            color:"#b8860b", glow:"#f5c43c", win:true  },
  { label:"Tente Novamente",   color:"#0a2e1a", glow:"#1a4429", win:false },
];

/* ═══════════════════════════════════════════════════════════════
   BACKGROUND — partículas
   ═══════════════════════════════════════════════════════════════ */
function buildParticles() {
  const c = document.getElementById('particles');
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.bottom = (Math.random() * 30) + '%';
    p.style.animationDuration = (12 + Math.random() * 18) + 's';
    p.style.animationDelay = -(Math.random() * 30) + 's';
    p.style.opacity = .4 + Math.random() * .4;
    c.appendChild(p);
  }
}

/* ═══════════════════════════════════════════════════════════════
   BULBS — luzes piscantes no aro dourado
   ═══════════════════════════════════════════════════════════════ */
const BULB_COUNT = 24;
function buildBulbs() {
  const c = document.getElementById('bulbs');
  c.innerHTML = '';
  for (let i = 0; i < BULB_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'bulb';
    const a = (i / BULB_COUNT) * Math.PI * 2 - Math.PI/2;
    b.style.left = `calc(50% + ${Math.cos(a) * 50}% / 2 * 1.05)`;
    b.style.top  = `calc(50% + ${Math.sin(a) * 50}% / 2 * 1.05)`;
    // corrige posicionamento — usa pixel relativo
    const wrap = document.getElementById('wheelWrap');
    c.appendChild(b);
  }
  positionBulbs();
}
function positionBulbs() {
  const wrap = document.getElementById('wheelWrap');
  const c = document.getElementById('bulbs');
  const bulbs = c.querySelectorAll('.bulb');
  const rect = wrap.getBoundingClientRect();
  const radius = (rect.width / 2) + 16; // 16px do bezel
  bulbs.forEach((b, i) => {
    const a = (i / BULB_COUNT) * Math.PI * 2 - Math.PI/2;
    b.style.left = `${50 + (Math.cos(a) * (radius / rect.width) * 100)}%`;
    b.style.top  = `${50 + (Math.sin(a) * (radius / rect.height) * 100)}%`;
  });
}

let bulbAnimating = false;
let bulbInterval = null;
function animateBulbs(active) {
  const bulbs = document.querySelectorAll('.bulb');
  if (active) {
    if (bulbAnimating) return;
    bulbAnimating = true;
    let frame = 0;
    // Single setInterval em vez de chain de setTimeouts (mais eficiente)
    bulbInterval = setInterval(() => {
      bulbs.forEach((b, i) => {
        const lit = (i + frame) % 2 === 0;
        b.classList.toggle('off', !lit);
      });
      frame++;
    }, 180);
  } else {
    bulbAnimating = false;
    if (bulbInterval) { clearInterval(bulbInterval); bulbInterval = null; }
    bulbs.forEach(b => b.classList.remove('off'));
  }
}

/* ═══════════════════════════════════════════════════════════════
   SESSION CYCLE — controla quantos prêmios cada participante leva
   Taxa de vitória: 50% (24 prêmios em 48 giros / 16 sessões)
   Distribuição: cada participante ganha em média 1.5 prêmios
   ═══════════════════════════════════════════════════════════════ */
const CYCLE_WINS = [2, 1, 2, 1, 2, 1, 2, 1, 2, 1, 2, 1, 2, 1, 2, 1];
let cyclePhase = 0;
let sessionSpin = 0;
let sessionPlan = [];
let sessionPrizesWon = [];

function initSession() {
  sessionSpin = 0;
  sessionPrizesWon = [];
  const wins = CYCLE_WINS[cyclePhase];
  const order = [0,1,2].sort(() => Math.random() - 0.5);
  sessionPlan = [false, false, false];
  for (let i = 0; i < wins; i++) sessionPlan[order[i]] = true;
  updateSessionUI();
  document.getElementById('nextBtn').style.display = 'none';
  const spinBtn = document.getElementById('spinBtn');
  spinBtn.disabled = false;
  spinBtn.style.display = 'block';
  document.getElementById('resultBar').classList.remove('active', 'win');
  document.getElementById('summary').style.display = 'none';
  // Reset zoom da roleta
  const wrap = document.getElementById('wheelWrap');
  wrap.style.transition = 'none';
  wrap.style.transform = '';
  void wrap.offsetWidth;
  // Garantir que UI está visível
  setUIVisible(true);
  stopConfetti();
}

function updateSessionUI() {
  document.getElementById('cur').textContent = Math.min(sessionSpin + 1, 3);
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('d' + i);
    d.className = 'dot ' + (i < sessionSpin ? 'done' : i === sessionSpin ? 'current' : '');
  }
}

function nextParticipant() {
  cyclePhase = (cyclePhase + 1) % CYCLE_WINS.length;
  initSession();
}

/* ═══════════════════════════════════════════════════════════════
   WHEEL — desenho premium no canvas
   ═══════════════════════════════════════════════════════════════ */
const wCanvas = document.getElementById('wheel');
const wCtx = wCanvas.getContext('2d');

// Carrega o logo da Corteva — usado no hub central
const logoImg = new Image();
let logoLoaded = false;
logoImg.onload = () => { logoLoaded = true; drawWheel(currentAngle); };
logoImg.onerror = () => { console.warn('Logo não carregado'); };
logoImg.src = 'corteva-logo.png';

function calcSize() {
  // Roleta GIGANTE — preenche quase toda a tela (como no desenho)
  const s = Math.floor(Math.min(window.innerHeight * 0.85, window.innerWidth * 0.72) / 2) * 2;
  const max = 1500;
  const size = Math.min(s, max);
  wCanvas.width = size; wCanvas.height = size;
  wCanvas.style.width = size + 'px';
  wCanvas.style.height = size + 'px';
  positionBulbs();
}

const SEGMENTS = PRIZES.length;
const ARC = (2 * Math.PI) / SEGMENTS;
let currentAngle = 0;
let spinning = false;
let startTime = null, spinDuration = 0, totalSpin = 0, lastEased = 0;

function drawWheel(angle) {
  const S = wCanvas.width, R = S / 2;
  const c = wCtx;
  c.clearRect(0, 0, S, S);

  // ─── Sombras concêntricas externas (profundidade) ───
  c.save();
  c.beginPath(); c.arc(R, R, R - 2, 0, Math.PI * 2);
  c.shadowColor = 'rgba(0,0,0,.6)'; c.shadowBlur = 30;
  c.fillStyle = '#000'; c.fill();
  c.restore();

  // ─── Anel externo metálico (fica no canvas, complementa o bezel CSS) ───
  c.save();
  c.beginPath(); c.arc(R, R, R - 4, 0, Math.PI * 2);
  const ring = c.createRadialGradient(R, R, R - 24, R, R, R - 4);
  ring.addColorStop(0,    '#1a4429');
  ring.addColorStop(0.7,  '#0a2e1a');
  ring.addColorStop(1,    '#000000');
  c.fillStyle = ring; c.fill();
  c.restore();

  // ─── Segmentos ───
  for (let i = 0; i < SEGMENTS; i++) {
    const st = angle + i * ARC;
    const en = st + ARC;
    const p = PRIZES[i];

    // base sólida
    c.beginPath();
    c.moveTo(R, R);
    c.arc(R, R, R - 22, st, en);
    c.closePath();
    c.fillStyle = p.color;
    c.fill();

    // gradiente radial (luz central)
    c.save();
    c.beginPath();
    c.moveTo(R, R);
    c.arc(R, R, R - 22, st, en);
    c.closePath();
    c.clip();
    const g = c.createRadialGradient(R, R, 0, R, R, R - 22);
    g.addColorStop(0,   'rgba(255,255,255,.22)');
    g.addColorStop(.45, 'rgba(255,255,255,.04)');
    g.addColorStop(1,   'rgba(0,0,0,.45)');
    c.fillStyle = g; c.fillRect(0, 0, S, S);
    c.restore();

    // brilho na borda externa (highlight do glow)
    c.save();
    c.beginPath();
    c.arc(R, R, R - 24, st, en);
    c.strokeStyle = p.glow;
    c.lineWidth = 3; c.globalAlpha = .35;
    c.stroke();
    c.restore();

    // separador dourado entre segmentos
    c.save();
    c.beginPath();
    c.moveTo(R, R);
    const ex = R + Math.cos(st) * (R - 22);
    const ey = R + Math.sin(st) * (R - 22);
    c.lineTo(ex, ey);
    c.strokeStyle = 'rgba(245,196,60,.5)';
    c.lineWidth = 2;
    c.stroke();
    c.restore();

    // texto — auto-ajusta pra caber no segmento
    c.save();
    c.translate(R, R);
    c.rotate(st + ARC / 2);

    // Distância do centro onde o texto fica
    const textRadius = R * 0.62;
    // Largura disponível pro texto
    const segWidth = 2 * textRadius * Math.sin(ARC / 2) - 16;
    const radialMax = (R - 22) - textRadius - 10;

    c.translate(textRadius, 0);
    c.fillStyle = '#ffffff';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    // Sombra discreta — só pra contraste, não chamativa
    c.shadowColor = 'rgba(0,0,0,.45)';
    c.shadowBlur = 3;
    c.shadowOffsetY = 1;

    // Tamanho da fonte: começa no ideal, reduz se não couber
    let fontSize = Math.max(18, Math.min(32, S * .048));
    let label = p.label;
    // Oswald 600 — peso médio, bem legível, não pesado demais
    c.font = `600 ${fontSize}px Oswald, sans-serif`;

    // Reduz o tamanho até caber
    while (c.measureText(label).width > Math.max(segWidth, radialMax * 2) && fontSize > 11) {
      fontSize -= 1;
      c.font = `600 ${fontSize}px Oswald, sans-serif`;
    }

    // Se ainda não couber, quebra em 2 linhas
    const measured = c.measureText(label).width;
    const fits = measured <= Math.max(segWidth, radialMax * 2);
    if (!fits && label.indexOf(' ') > -1) {
      const words = label.split(' ');
      const line1 = words[0];
      const line2 = words.slice(1).join(' ');
      c.fillText(line1, 0, -fontSize * 0.55);
      c.fillText(line2, 0,  fontSize * 0.55);
    } else {
      c.fillText(label, 0, 0);
    }
    c.restore();
  }

  // ─── Borda interna decorativa ───
  c.save();
  c.beginPath();
  c.arc(R, R, R - 22, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(245,196,60,.6)';
  c.lineWidth = 4;
  c.stroke();
  c.beginPath();
  c.arc(R, R, R - 22, 0, Math.PI * 2);
  c.strokeStyle = 'rgba(0,0,0,.5)';
  c.lineWidth = 1;
  c.stroke();
  c.restore();

  // ─── Pinos de cassino entre os segmentos ───
  // Pinos um pouco pra dentro, em cima dos segmentos coloridos (não cobertos pelo bezel)
  for (let i = 0; i < SEGMENTS; i++) {
    const a = angle + i * ARC; // borda do segmento
    const pinR = R - 32; // pra dentro do anel dourado, em cima dos segmentos
    const px = R + Math.cos(a) * pinR;
    const py = R + Math.sin(a) * pinR;
    const pinSize = Math.max(8, S * .015);

    // sombra do pino
    c.save();
    c.beginPath();
    c.arc(px + 1, py + 2, pinSize, 0, Math.PI * 2);
    c.fillStyle = 'rgba(0,0,0,.6)';
    c.fill();
    c.restore();

    // pino branco com gradiente (3D esférico)
    const pg = c.createRadialGradient(
      px - pinSize * .35, py - pinSize * .35, 0,
      px, py, pinSize
    );
    pg.addColorStop(0,   '#ffffff');
    pg.addColorStop(.45, '#f5f5f5');
    pg.addColorStop(1,   '#999999');
    c.beginPath();
    c.arc(px, py, pinSize, 0, Math.PI * 2);
    c.fillStyle = pg;
    c.fill();
    // borda
    c.strokeStyle = 'rgba(0,0,0,.5)';
    c.lineWidth = 1.5;
    c.stroke();
    // brilho
    c.beginPath();
    c.arc(px - pinSize * .3, py - pinSize * .3, pinSize * .25, 0, Math.PI * 2);
    c.fillStyle = 'rgba(255,255,255,.9)';
    c.fill();
  }

  // ─── Hub central ───
  const hr = Math.max(52, S * .13); // hub grande pra acomodar logo completo
  // sombra do hub (não do logo)
  c.save();
  c.beginPath();
  c.arc(R + 2, R + 4, hr, 0, Math.PI * 2);
  c.fillStyle = 'rgba(0,0,0,.5)';
  c.filter = 'blur(8px)';
  c.fill();
  c.restore();

  // base do hub (gradiente verde escuro)
  c.beginPath();
  c.arc(R, R, hr, 0, Math.PI * 2);
  const hub = c.createRadialGradient(R - hr * .3, R - hr * .3, 0, R, R, hr);
  hub.addColorStop(0,   '#6fdc99');
  hub.addColorStop(.4,  '#1a8244');
  hub.addColorStop(.85, '#0a2e1a');
  hub.addColorStop(1,   '#000000');
  c.fillStyle = hub;
  c.fill();

  // anel dourado do hub
  c.beginPath();
  c.arc(R, R, hr - 2, 0, Math.PI * 2);
  c.strokeStyle = '#f5c43c';
  c.lineWidth = 3;
  c.stroke();

  // Logo da Corteva (sem sombra, limpo)
  if (logoLoaded) {
    c.save();
    // Recorta circular
    c.beginPath();
    c.arc(R, R, hr - 6, 0, Math.PI * 2);
    c.clip();
    // Logo horizontal — calcula tamanho mantendo proporção
    const ratio = logoImg.width / logoImg.height;
    const maxW = (hr - 6) * 1.7;
    const maxH = (hr - 6) * 1.1;
    let lw = maxW, lh = lw / ratio;
    if (lh > maxH) { lh = maxH; lw = lh * ratio; }
    // Sem sombra — desenha limpo
    c.drawImage(logoImg, R - lw/2, R - lh/2, lw, lh);
    c.restore();
  } else {
    // Fallback enquanto o logo não carrega
    c.save();
    c.translate(R, R);
    c.font = `900 ${Math.max(22, S * .055)}px Cinzel, serif`;
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = '#ffe680';
    c.fillText('C', 0, 1);
    c.restore();
  }
}

/* ═══════════════════════════════════════════════════════════════
   SPIN — animação cinematográfica
   ═══════════════════════════════════════════════════════════════ */
let lastTickSeg = -1;
let pointerKick = 0;

function easeSpin(t) {
  if (t <= 0) return 0;
  if (t >= 1) return 1;
  // easeOutQuint puro, monotônico, suspense longo no fim
  return 1 - Math.pow(1 - t, 5);
}

// Variável global pra guardar qual segmento foi sorteado em computeForcedSpin
// (fonte da verdade — usada no revealResult pra evitar inconsistência com o ângulo visual)
let targetSegmentIdx = 0;

function computeForcedSpin(shouldWin) {
  const candidates = PRIZES.map((p, i) => ({ p, i })).filter(x => x.p.win === shouldWin);
  const { i: targetIdx } = candidates[Math.floor(Math.random() * candidates.length)];
  // Guarda o índice do segmento alvo — fonte da verdade no revealResult
  targetSegmentIdx = targetIdx;
  // Cair PERTO do meio do segmento (40-60%) — margem maior pro wobble não atravessar borda
  const offset = ARC * (0.40 + Math.random() * 0.20);
  const targetFinal = ((-Math.PI / 2) - targetIdx * ARC - offset + 6 * Math.PI) % (2 * Math.PI);
  let delta = (targetFinal - currentAngle % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (delta < 0.3) delta += 2 * Math.PI;
  // 8 a 12 voltas
  totalSpin = delta + (8 + Math.floor(Math.random() * 5)) * 2 * Math.PI;
  spinDuration = 8500 + Math.random() * 1500;
}

document.getElementById('spinBtn').onclick = function() {
  if (spinning || sessionSpin >= 3) return;
  spinning = true;
  this.disabled = true;
  computeForcedSpin(sessionPlan[sessionSpin]);
  startTime = null; lastEased = 0; lastTickSeg = -1; pointerKick = 0;
  wCanvas.classList.add('spinning');
  document.body.classList.add('spinning'); // pausa partículas/orbs durante giro
  animateBulbs(true);
  const wrap = document.getElementById('wheelWrap');
  wrap.style.transition = 'none';
  wrap.style.transform = 'scale(1)';
  void wrap.offsetWidth;
  uiHidden = false;
  requestAnimationFrame(animSpin);
};

// ─── UI fade durante o zoom ───
let uiHidden = false;
function setUIVisible(visible) {
  if (visible === !uiHidden) return;
  uiHidden = !visible;
  document.querySelector('.header').classList.toggle('hidden', !visible);
  document.querySelector('.counter').classList.toggle('hidden', !visible);
  document.querySelector('.actions').classList.toggle('hidden', !visible);
}

function animSpin(ts) {
  if (!startTime) { startTime = ts; lastEased = 0; }
  const el = ts - startTime;
  const prog = Math.min(el / spinDuration, 1);
  const eased = easeSpin(prog);
  const delta = eased - lastEased;
  currentAngle = (currentAngle + totalSpin * delta) % (2 * Math.PI);
  lastEased = eased;

  // Zoom DINÂMICO desde o início — sutil porque a roleta já é gigante
  // 0% - 70%: zoom suave 1.00 → 1.05
  // 70% - 90%: zoom mais forte 1.05 → 1.12
  // 90% - 100%: zoom dramático 1.12 → 1.20
  let zoom;
  if (prog < 0.70) {
    const k = prog / 0.70;
    zoom = 1.00 + (1 - Math.pow(1 - k, 2)) * 0.05;
  } else if (prog < 0.90) {
    const k = (prog - 0.70) / 0.20;
    const eased2 = k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2;
    zoom = 1.05 + eased2 * 0.07;
  } else {
    const k = (prog - 0.90) / 0.10;
    zoom = 1.12 + (1 - Math.pow(1 - k, 3)) * 0.08;
  }
  if (prog >= 0.68) setUIVisible(false);
  const wrap = document.getElementById('wheelWrap');
  wrap.style.transform = `scale(${zoom.toFixed(3)})`;

  // ─── Detecta colisão da seta com os pinos ───
  // Os pinos ficam nas bordas dos segmentos. A seta está no topo (-PI/2).
  // Distância angular do pino mais próximo à seta:
  const pointerAngle = -Math.PI / 2;
  // Ângulo do pino i (no referencial mundial) = currentAngle + i * ARC
  // Quero saber qual pino tá mais perto de pointerAngle
  // Normaliza diff entre cada pino e a seta
  let nearestDist = Infinity;
  for (let i = 0; i < SEGMENTS; i++) {
    const pinAngle = (currentAngle + i * ARC) % (2 * Math.PI);
    let diff = pinAngle - pointerAngle;
    // Normaliza pra [-PI, PI]
    diff = ((diff + Math.PI * 3) % (Math.PI * 2)) - Math.PI;
    const absDiff = Math.abs(diff);
    if (absDiff < nearestDist) nearestDist = absDiff;
  }

  // Se o pino tá BEM perto da seta (zona de impacto), dispara o kick
  // ARC * 0.10 ≈ 5% do segmento — bem pertinho
  const impactZone = ARC * 0.12;
  if (nearestDist < impactZone) {
    // Quanto mais perto, mais forte o kick (curva quadrática)
    const intensity = 1 - (nearestDist / impactZone);
    pointerKick = Math.max(pointerKick, Math.min(1, intensity * 1.2));
  }

  // Decay do kick — volta rápido
  pointerKick *= 0.82;
  applyPointerKick(pointerKick);

  drawWheel(currentAngle);

  if (prog < 1) {
    requestAnimationFrame(animSpin);
  } else {
    pointerKick = 0;
    applyPointerKick(0);
    runFinalWobble(() => {
      spinning = false;
      sessionSpin++;
      wCanvas.classList.remove('spinning');
      document.body.classList.remove('spinning'); // retoma partículas/orbs
      animateBulbs(false);
      flashWinningSegment();
      zoomToWinner(() => revealResult());
    });
  }
}

// Movimento da seta como se batesse nos pinos
function applyPointerKick(intensity) {
  const ptr = document.querySelector('.pointer');
  if (!ptr) return;
  // Ao invés de balançar lateralmente, a seta SOBE quando atingida
  // (imagina o pino empurrando ela pra cima) e cai de volta
  const lift = -intensity * 14; // sobe até 14px
  const tilt = (Math.sin(performance.now() * 0.04) * intensity) * 6; // tremor leve
  ptr.style.transform = `translateX(-50%) translateY(${lift}px) rotate(${tilt}deg)`;
}

function runFinalWobble(done) {
  const baseAngle = currentAngle;
  const start = performance.now();
  const dur = 700;
  const amp = ARC * 0.05;
  function step(now) {
    const t = Math.min((now - start) / dur, 1);
    const decay = Math.pow(1 - t, 2);
    const wobble = Math.sin(t * Math.PI * 5) * amp * decay;
    currentAngle = (baseAngle + wobble + 2 * Math.PI) % (2 * Math.PI);
    drawWheel(currentAngle);
    if (t < 1) requestAnimationFrame(step);
    else { currentAngle = baseAngle; drawWheel(currentAngle); done(); }
  }
  requestAnimationFrame(step);
}

function flashWinningSegment() {
  const wrap = document.getElementById('wheelWrap');
  wrap.classList.add('flash');
  setTimeout(() => wrap.classList.remove('flash'), 1000);
}

function zoomToWinner(done) {
  const wrap = document.getElementById('wheelWrap');
  // Close dramático final — foca no item vencedor
  wrap.style.transition = 'transform 900ms cubic-bezier(.16,1,.3,1)';
  wrap.style.transform = 'translateY(8%) scale(1.28)';
  setTimeout(done, 950);
  setTimeout(() => {
    wrap.style.transition = 'transform 700ms cubic-bezier(.5,0,.3,1)';
    wrap.style.transform = '';
    // UI volta junto com a roleta voltando ao normal
    setUIVisible(true);
  }, 5400);
}

/* ═══════════════════════════════════════════════════════════════
   RESULT
   ═══════════════════════════════════════════════════════════════ */
function revealResult() {
  // FONTE DA VERDADE: usa o segmento sorteado em computeForcedSpin
  // Evita bugs onde o wobble visual empurra o ponteiro pra borda do segmento vizinho
  const p = PRIZES[targetSegmentIdx];

  // DEBUG: confirma no console que estamos pegando o segmento certo
  console.log('[REVEAL] targetSegmentIdx=' + targetSegmentIdx + ' label=' + p.label + ' win=' + p.win + ' shouldWin=' + sessionPlan[sessionSpin]);

  const icon  = document.getElementById('resIcon');
  const label = document.getElementById('resLabel');
  const name  = document.getElementById('resName');
  const bar   = document.getElementById('resultBar');

  if (p.win) {
    sessionPrizesWon.push(p);
    // Sorteia emoji de comemoração (codepoints)
    const winEmojis = [
      0x1F3C6, // 🏆 troféu
      0x1F389, // 🎉 confete
      0x1F973, // 🥳 festa
      0x1F38A, // 🎊 bola de festa
      0x1F381, // 🎁 presente
      0x1F31F, // 🌟 estrela
    ];
    const cp = winEmojis[Math.floor(Math.random() * winEmojis.length)];
    icon.textContent  = String.fromCodePoint(cp);
    label.textContent = String.fromCodePoint(0x2728) + '  Parabéns! Você ganhou:';
    name.textContent  = p.label;
    name.style.color  = '';
    bar.classList.add('win');
    launchConfetti(p.glow);
    spawnWinStars();
  } else {
    // Sorteia emoji de tristeza/diversão (codepoints — imune a encoding)
    const loseEmojis = [
      0x1F605, // 😅 sorriso constrangido
      0x1F61C, // 😜 piscando
      0x1F923, // 🤣 rolando de rir
      0x1F602, // 😂 chorando de rir
      0x1F62D, // 😭 chorão
      0x1F614, // 😔 cabisbaixo
      0x1F643, // 🙃 cabeça pra baixo
    ];
    const cp = loseEmojis[Math.floor(Math.random() * loseEmojis.length)];
    icon.textContent  = String.fromCodePoint(cp);
    label.textContent = String.fromCodePoint(0x1F340) + '  Não foi desta vez...';
    name.textContent  = 'Tente Novamente!';
    name.style.color  = '#6fdc99';
    bar.classList.remove('win');
  }

  bar.classList.add('active');
  setTimeout(closeResult, 3500);
}

function spawnWinStars() {
  const emojis = ['⭐', '🌟', '✨', '💫', '🏆'];
  for (let i = 0; i < 14; i++) {
    setTimeout(() => {
      const s = document.createElement('div');
      s.className = 'win-star';
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = (10 + Math.random() * 80) + 'vw';
      s.style.bottom = (80 + Math.random() * 15) + 'px';
      s.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 2500);
    }, i * 160);
  }
}

function closeResult() {
  const bar = document.getElementById('resultBar');
  bar.classList.remove('active', 'win');
  stopConfetti();
  if (sessionSpin >= 3) {
    updateSessionUI();
    document.getElementById('spinBtn').style.display = 'none';
    setTimeout(showSummary, 600);
  } else {
    updateSessionUI();
    document.getElementById('spinBtn').disabled = false;
  }
}

/* ═══════════════════════════════════════════════════════════════
   SUMMARY
   ═══════════════════════════════════════════════════════════════ */
function showSummary() {
  const overlay = document.getElementById('summary');
  const prizesDiv = document.getElementById('sumPrizes');
  prizesDiv.innerHTML = '';
  const won = sessionPrizesWon.length;

  if (won === 0) {
    document.getElementById('sumIcon').textContent  = '🌾';
    document.getElementById('sumTitle').textContent = 'Não foi desta vez';
    document.getElementById('sumMsg').textContent   = 'Tente novamente em outra oportunidade';
    launchConfettiSubtle();
  } else {
    document.getElementById('sumIcon').textContent  = won >= 2 ? '🏆' : '🎁';
    document.getElementById('sumTitle').textContent = won >= 2 ? `Parabéns — ${won} prêmios!` : 'Parabéns! Você ganhou!';
    document.getElementById('sumMsg').textContent   = 'Retire seu brinde no balcão';
    sessionPrizesWon.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'summary-card';
      card.style.color = p.color;
      card.style.animationDelay = (i * 0.1) + 's';
      card.textContent = p.label;
      prizesDiv.appendChild(card);
    });
    launchConfetti(sessionPrizesWon[0].glow);
    spawnWinStars();
  }
  overlay.style.display = 'flex';
}

/* ═══════════════════════════════════════════════════════════════
   CONFETTI
   ═══════════════════════════════════════════════════════════════ */
const cc = document.getElementById('confetti-canvas');
const cctx = cc.getContext('2d');
let confP = [], confA = null;

function resCC() { cc.width = window.innerWidth; cc.height = window.innerHeight; }
resCC();
window.addEventListener('resize', resCC);

function launchConfetti(accent) {
  confP = [];
  const cols = ['#1a8244', '#2cb863', '#6fdc99', '#f5c43c', '#ffe680', '#ffffff', accent];
  for (let i = 0; i < 220; i++) {
    confP.push({
      x: Math.random() * cc.width, y: -20,
      w: Math.random() * 12 + 4, h: Math.random() * 6 + 3,
      color: cols[Math.floor(Math.random() * cols.length)],
      vx: (Math.random() - .5) * 5, vy: Math.random() * 5 + 2,
      rot: Math.random() * 360, rotV: (Math.random() - .5) * 9,
      opacity: 1
    });
  }
  if (confA) cancelAnimationFrame(confA);
  animConf();
}

function launchConfettiSubtle() {
  confP = [];
  const cols = ['#1a4429', '#0a2e1a', '#2cb863'];
  for (let i = 0; i < 50; i++) {
    confP.push({
      x: Math.random() * cc.width, y: -20,
      w: Math.random() * 8 + 3, h: Math.random() * 5 + 2,
      color: cols[Math.floor(Math.random() * cols.length)],
      vx: (Math.random() - .5) * 3, vy: Math.random() * 3 + 1,
      rot: Math.random() * 360, rotV: (Math.random() - .5) * 5,
      opacity: .6
    });
  }
  if (confA) cancelAnimationFrame(confA);
  animConf();
}

function animConf() {
  cctx.clearRect(0, 0, cc.width, cc.height);
  let alive = false;
  confP.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += .12;
    if (p.y > cc.height - 40) p.opacity -= .022;
    if (p.opacity > 0) alive = true;
    cctx.save();
    cctx.translate(p.x, p.y);
    cctx.rotate(p.rot * Math.PI / 180);
    cctx.globalAlpha = Math.max(0, p.opacity);
    cctx.fillStyle = p.color;
    cctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    cctx.restore();
  });
  if (alive) confA = requestAnimationFrame(animConf);
  else cctx.clearRect(0, 0, cc.width, cc.height);
}

function stopConfetti() {
  confP = [];
  cctx.clearRect(0, 0, cc.width, cc.height);
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
calcSize();
window.addEventListener('resize', () => { calcSize(); drawWheel(currentAngle); });
buildParticles();
buildBulbs();
drawWheel(0);
initSession();

/* ═══════════════════════════════════════════════════════════════
   WEBSOCKET — recebe comandos do celular (controle remoto)
   ═══════════════════════════════════════════════════════════════ */
(function setupWebSocket() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/ws?role=totem`;
  let ws = null;
  let reconnectTimer = null;

  function connect() {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      console.log('[WS] Conectado como totem');
      sendSessionState();
    };
    ws.onmessage = (ev) => {
      try {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'spin') {
          const btn = document.getElementById('spinBtn');
          if (btn && !btn.disabled) btn.click();
        } else if (msg.type === 'next') {
          if (typeof nextParticipant === 'function') nextParticipant();
        }
      } catch (e) {}
    };
    ws.onclose = () => {
      console.log('[WS] Desconectado, tentando reconectar...');
      clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  window.wsSend = function(msg) {
    if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg));
  };

  function sendSessionState() {
    window.wsSend({
      type: 'session_state',
      sessionSpin: typeof sessionSpin !== 'undefined' ? sessionSpin : 0,
      canSpin: typeof spinning !== 'undefined' ? !spinning && sessionSpin < 3 : true
    });
  }

  // Patch: spinBtn click manda "spinning"
  const origSpinClick = document.getElementById('spinBtn').onclick;
  document.getElementById('spinBtn').onclick = function() {
    if (origSpinClick) origSpinClick.call(this);
    if (spinning) window.wsSend({ type: 'spinning' });
  };

  // Hook revealResult — usa targetSegmentIdx (fonte da verdade)
  const origReveal = window.revealResult;
  window.revealResult = function() {
    origReveal();
    // FIX: usa o segmento sorteado, não o ângulo atual (evita inconsistência totem vs celular)
    const p = PRIZES[targetSegmentIdx];
    window.wsSend({
      type: 'result',
      win: p.win,
      label: p.label,
      sessionSpin: sessionSpin,
      sessionEnded: sessionSpin >= 3
    });
  };

  const origInit = window.initSession;
  window.initSession = function() {
    origInit();
    setTimeout(sendSessionState, 100);
  };

  const origClose = window.closeResult;
  window.closeResult = function() {
    origClose();
    setTimeout(sendSessionState, 100);
  };

  connect();
})();
</script>
